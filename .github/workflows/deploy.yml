name: Build, Test & Deploy to Floci S3 + Docker Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ========== BUILD & TEST ==========
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint || true

      - name: Build project
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ./dist

  # ========== DEPLOY TO FLOCI S3 ==========
  deploy-to-floci:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: ./dist

      - name: Deploy to Floci S3
        run: |
          # Configure AWS for Floci
          aws configure set aws_access_key_id test
          aws configure set aws_secret_access_key test
          aws configure set region us-east-1
          
          # Create bucket if not exists
          aws s3 mb s3://anaghaa-website-bucket \
            --endpoint-url http://localhost:4566 \
            2>/dev/null || true
          
          # Sync files to S3
          aws s3 sync ./dist s3://anaghaa-website-bucket \
            --endpoint-url http://localhost:4566 \
            --delete
          
          echo "✅ Deployed to Floci S3!"
          echo "Access at: http://localhost:4566/anaghaa-website-bucket/"

  # ========== DEPLOY TO DOCKER HUB ==========
  deploy-to-docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/anaghaa-manpower:latest
            ${{ secrets.DOCKER_USERNAME }}/anaghaa-manpower:${{ github.sha }}

      - name: Output image info
        run: |
          echo "🐳 Docker Image pushed successfully!"
          echo "Image: ${{ secrets.DOCKER_USERNAME }}/anaghaa-manpower:latest"
          echo "Tag: ${{ github.sha }}"